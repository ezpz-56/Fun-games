<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: black; }
        canvas { border: 1px solid white; }
        h1 { color: white; }
    </style>
</head>
<body>
    <h1>Pong Game</h1>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle and ball
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white', score: 0 };
        const computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white', score: 0 };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 5, velocityX: 5, velocityY: 5 };

        // Draw the paddles and ball
        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = player.color;
            context.fillRect(player.x, player.y, player.width, player.height);
            context.fillStyle = computer.color;
            context.fillRect(computer.x, computer.y, computer.width, computer.height);
            context.fillStyle = 'white';
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
            context.font = '20px Arial';
            context.fillText(`Player: ${player.score}`, 50, 20);
            context.fillText(`Computer: ${computer.score}`, canvas.width - 150, 20);
        }

        // Reset ball to center after scoring
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        // Update the game objects
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Ball collision with paddles
            const paddleCollide = (paddle) => {
                return ball.x - ball.radius < paddle.x + paddle.width &&
                       ball.x + ball.radius > paddle.x &&
                       ball.y - ball.radius < paddle.y + paddle.height &&
                       ball.y + ball.radius > paddle.y;
            };
            if (paddleCollide(player)) {
                ball.velocityX = -ball.speed;
            } else if (paddleCollide(computer)) {
                ball.velocityX = ball.speed;
            }

            // Score update
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        // Control the player paddle
        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });

        // Computer AI - simple paddle following
        function computerAI() {
            if (computer.y + computer.height / 2 < ball.y) {
                computer.y += 4;
            } else {
                computer.y -= 4;
            }
        }

        // Game loop
        function gameLoop() {
            draw();
            update();
            computerAI();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
